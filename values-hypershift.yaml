# Override values for HyperShift 
# Define the s3 bucket information  
global:
  hypershift:
    oidc:
# OIDC bucket information: provide regoin and bucketName
      region: us-east-2
      bucketName: vp-hypershift-state
      
# AWS S3 Controller for Kubernetes configuration 
# Only modify this when creating a new s3 bucket for your deployment
  s3:
    # Should the pattern create the s3 bucket(true), or bring your own (false). 
    createBucket: false

    # Any additional tags to add to a bucket created by the pattern
    additionalTags: 
      lifecycle: keep

# register a GitHub oAuth application: https://github.com/settings/applications/new
# configure oauth provider: https://docs.openshift.com/container-platform/4.15/authentication/understanding-identity-provider.html
#
# The default configuration uses github as the provider
  oauth:
    type: GitHub
    secretName: ocp-github-oauth
    github:
      clientID: a2f32e0b1d39c9b6098b
      orgs:
      - name: validatedpatterns

# Set rbac.create to false if you want to skip creation of role/rolebinding.
rbac:
  create: true
# Provide a list of users to add to the clusterrolebinding
  users:
  - day0hero
  - mbaldessari
  - beekhof
  - darkdoc
  - claudiol
  - mhjacks
  - mlabonte-rh
  - yukinchan
  - dminnear-rh
  - gaurav-nelson

# Cluster Autoscaling Configuration
# Enable autoscaling to automatically adjust cluster size based on workload demands
autoscaling:
  clusterAutoscaler:
    # Set to true to enable cluster autoscaling
    enabled: true
    # Balance nodes across similar MachineSets (e.g., across availability zones)
    balanceSimilarNodeGroups: true
    # Allow scale-down of nodes running pods with emptyDir volumes
    skipNodesWithLocalStorage: false
    resourceLimits:
      # Maximum total nodes allowed in the cluster
      maxNodesTotal: 24
      cores:
        min: 8
        max: 128
      memory:
        min: 32
        max: 512
    scaleDown:
      enabled: true
      # Time to wait after scale up before considering scale down
      delayAfterAdd: "10m"
      # Node utilization threshold (0.0-1.0) below which nodes are candidates for removal
      utilizationThreshold: "0.6"
  machineAutoscalers:
    - name: worker-autoscaler-2a
      enabled: true
      machineSetName: hyper2-v7xhq-worker-us-east-2a
      minReplicas: 0
      maxReplicas: 6
    - name: worker-autoscaler-2b
      enabled: true
      machineSetName: hyper2-v7xhq-worker-us-east-2b
      minReplicas: 0
      maxReplicas: 6
    - name: worker-autoscaler-2c
      enabled: true
      machineSetName: hyper2-v7xhq-worker-us-east-2c
      minReplicas: 0
      maxReplicas: 6

apiVersion: config.openshift.io/v1
kind: OAuth
metadata:
  name: cluster
spec:
  identityProviders:
  - github:
      clientID: {{ .Values.global.oauth.github.clientID }}
      clientSecret:
        name: {{ .Values.global.oauth.secretName }}
      organizations:
{{- range .Values.global.github.orgs }}
      - {{ .name }}
{{- end }}
{{- $teams := list }}
{{- range .Values.global.github.orgs }}
{{- $orgName := .name }}
{{- range .teams }}
{{- $teams = append $teams (printf "%s/%s" $orgName .) }}
{{- end }}
{{- end }}
{{- if $teams }}
      teams:
{{- range $teams }}
      - {{ . }}
{{- end }}
{{- end }}
    mappingMethod: claim
    name: github
    type: GitHub
  tokenConfig:
    accessTokenMaxAgeSeconds: 62208000


---
apiVersion: "external-secrets.io/v1beta1"
kind: ExternalSecret
metadata:
  name: hypershift-eso-aws
  namespace: multicluster-engine
spec:
  refreshInterval: 15s
  secretStoreRef:
    name: {{ .Values.secretStore.name }}
    kind: {{ .Values.secretStore.kind }}
  target:
    name: awscreds
    template:
      type: Opaque
  dataFrom:
  - extract:
      key: {{ .Values.awscredentials.key }}

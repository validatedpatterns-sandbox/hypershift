apiVersion: v1
kind: ConfigMap
metadata:
  name: ack-s3-user-config
  namespace: ack-system
  annotations:
    argocd.argoproj.io/hook: PreSync
data:
{{- range $k, $v := .Values.ackS3 }}
  {{ $k | upper }}: {{ $v | quote }}
{{- end }}
  AWS_REGION: {{ $.Values.s3.region | quote}}
  ACK_WATCH_NAMESPACE:
  ACK_ENDPOINT_URL:
  LEADER_ELECTION_NAMESPACE:

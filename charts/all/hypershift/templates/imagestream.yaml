apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: hcp-cli
  namespace: multicluster-engine
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  lookupPolicy:
    local: false
  tags:
  - name: {{ .Values.imagestream.tag }}
    from:
      kind: DockerImage
      name: {{ .Values.imagestream.sourceImage }}
    referencePolicy:
      type: Source

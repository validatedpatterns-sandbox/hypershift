kind: BuildConfig
apiVersion: build.openshift.io/v1
metadata:
  name: hcp-cli-bc
  namespace: multicluster-engine
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  source:
    type: Git
    git:
      uri: {{ coalesce .Values.global.buildconfig.git.uri .Values.buildconfig.git.uri "https://github.com/validatedpatterns-sandbox/hypershift" }}
    contextDir: {{ .Values.buildconfig.git.contextDir }}
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: {{ .Values.buildconfig.dockerfilePath | default "Containerfile" }}
  triggers:
    - type: ConfigChange
  output:
    to:
      kind: ImageStreamTag
      name: hcp-cli:{{ .Values.imagestream.tag | default "latest"}}


kind: BuildConfig
apiVersion: build.openshift.io/v1
metadata:
  name: hcpcli-bc
  namespace: multicluster-engine
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  source:
    type: Git
    git:
      uri: {{ .Values.buildconfig.git.uri }}
      ref: {{ .Values.buildconfig.git.ref | default "main" }}
    contextDir: {{ .Values.buildconfig.git.contextDir }}
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: {{ .Values.buildconfig.dockerfilePath | default "Containerfile" }}
  triggers:
    - type: ImageChange
  output:
    to:
      kind: ImageStreamTag
      name: hcp-cli:{{ .Values.imagestream.tag | default "latest"}}


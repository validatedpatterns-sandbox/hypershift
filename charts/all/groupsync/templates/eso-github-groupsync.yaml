---
apiVersion: "external-secrets.io/v1beta1"
kind: ExternalSecret
metadata:
  name: {{ .Values.global.groupsync.secretName }}
  namespace: group-sync-operator
  annotations:
    argocd.argoproj.io/sync-wave: '10'
spec:
  refreshInterval: 15s
  secretStoreRef:
    name: {{ .Values.secretStore.name }}
    kind: {{ .Values.secretStore.kind }}
  target:
    name: {{ .Values.global.groupsync.github.credentialsSecretName }}
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        appId: |-
          {{ "{{ .appId | trim }}" }}
        installationId: |-
          {{ "{{ .installationId | trim }}" }}
        privateKey: |-
          {{ "{{ .privateKey }}" }}
  data:
  - secretKey: appId
    remoteRef:
      key: {{ default "secret/data/hub/githubGroupSync" .Values.githubAppKeyPath }}
      property: appId
  - secretKey: installationId
    remoteRef:
      key: {{ default "secret/data/hub/githubGroupSync" .Values.githubAppKeyPath }}
      property: installationId
  - secretKey: privateKey
    remoteRef:
      key: {{ default "secret/data/hub/githubGroupSync" .Values.githubAppKeyPath }}
      property: privateKey

clusterGroup:
  name: prod
  isHubCluster: true
  sharedValueFiles:
    - /values-hypershift.yaml
    - '/overrides/values-{{ $.Values.global.clusterPlatform }}.yaml'
    - '/overrides/values-{{ $.Values.global.clusterVersion }}-{{ $.Values.clusterGroup.name }}.yaml'

  namespaces:
    vault:
    multicluster-engine:
    group-sync-operator:
    golang-external-secrets:
      disabled: true
    external-secrets-operator:
      operatorGroup: true
      targetNamespaces: []
    external-secrets:

  subscriptions:
    eso:
      name: openshift-external-secrets-operator
      namespace: external-secrets-operator
      channel: stable-v1

    mce:
      name: multicluster-engine
      namespace: multicluster-engine
      channel: stable-2.11

    groupsync:
      name: group-sync-operator
      namespace: group-sync-operator
      source: community-operators
      channel: alpha

  argoProjects:
    - hub
    - hypershift

  applications:
    vault:
      name: vault
      namespace: vault
      project: hub
      chart: hashicorp-vault
      chartVersion: 0.1.*

    golang-external-secrets:
      disabled: true
    openshift-external-secrets:
      name: openshift-external-secrets
      namespace: external-secrets
      argoProject: hub
      chart: openshift-external-secrets
      chartVersion: 0.0.*

    hypershift:
      disabled: false
      name: hypershift
      namespace: multicluster-engine
      argoProject: hypershift
      path: charts/all/hypershift

    oauth:
      disabled: false
      name: oauth
      namespace: openshift-config
      argoProject: hub
      path: charts/all/oauth

    groupsync:
      disabled: false
      name: groupsync
      namespace: group-sync-operator
      argoProject: hub
      path: charts/all/groupsync

    kubelet-config:
      disabled: false
      name: kubelet-config
      namespace: openshift-machine-config-operator
      argoProject: hub
      path: charts/all/kubelet-config
      # Apply after other hub Applications (default sync-wave 0). KubeletConfig triggers
      # MCO rollouts that can disrupt pods (e.g. Vault) if they run concurrently.
      annotations:
        argocd.argoproj.io/sync-wave: "100"
      ignoreDifferences:
        - group: machineconfiguration.openshift.io
          kind: KubeletConfig
          jqPathExpressions:
            - .metadata.annotations

  imperative:
    # NOTE: We *must* use lists and not hashes. As hashes lose ordering once parsed by helm
    # The default schedule is every 10 minutes: imperative.schedule
    # Total timeout of all jobs is 1h: imperative.activeDeadlineSeconds
    # imagePullPolicy is set to always: imperative.imagePullPolicy
    # For additional overrides that apply to the jobs, please refer to
    # https://hybrid-cloud-patterns.io/imperative-actions/#additional-job-customizations
    namespace: imperative
    jobs:
    - name: hello-world
      # ansible playbook to be run
      playbook: rhvp.cluster_utils.hello_world
      # per playbook timeout in seconds
      timeout: 234
      # verbosity: "-v"

  managedClusterGroups:
    exampleRegion:
      name: group-one
      acmlabels:
      - name: clusterGroup
        value: group-one
      helmOverrides:
      - name: clusterGroup.isHubCluster
        value: false
